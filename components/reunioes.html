<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Reuniões</title>
    <!-- CSS Base e Admin -->
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="../dist/bundle.js"></script>
</head>
<body>

    <!-- PARTICULAS -->
    <div class="particles"></div>

    <div class="painel">
        <!-- SIDEBAR -->
        <aside class="sidebar glow-card" style="margin: 20px; border-radius: 20px;">
            <h2 style="color: #00ff99; text-align: center; margin-bottom: 30px;">LEOZÃO</h2>
            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="painel.html">
                <i class="fa-solid fa-users"></i> Apoiadores
            </a>
            <a href="reunioes.html" class="active">
                <i class="fa-solid fa-handshake"></i> Reuniões
            </a>
            <a href="exportar_excel.html">
                <i class="fa-solid fa-file-excel"></i> Exportar Excel
            </a>
            <a href="../index.html" style="margin-left: auto;">
                <i class="fa-solid fa-house"></i> Voltar ao Site
            </a>
            <a href="logout.html" style="color: #ff4d4d;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </a>
        </aside>

        <!-- CONTEUDO -->
        <main class="conteudo">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="color: #00ff99;">Gerenciar Reuniões</h2>
                <button id="btn-nova-reuniao" class="btn glow" style="padding: 10px 20px; font-size: 16px;">Nova Reunião</button>
            </div>

            <!-- FORM DE CADASTRO -->
            <div id="reunioes-form-container" class="form-box glow-card" style="max-width: 100%; margin-bottom: 40px; display: none;">
                <h3 style="margin-bottom: 20px;">Cadastrar Nova Reunião</h3>
                <form id="form-reuniao">
                    <input type="datetime-local" name="data" required>
                    <input type="text" name="descricao" placeholder="Objetivo da reunião (Descrição)" required>
                    <input type="text" name="local" placeholder="Local da reunião" required>
                    
                    <select name="modalidade" required style="padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,0.15); color: white; margin-bottom: 20px;">
                        <option value="" disabled selected>Selecione a Modalidade</option>
                        <option value="Presencial" style="color: black;">Presencial</option>
                        <option value="Online" style="color: black;">Online</option>
                        <option value="Híbrida" style="color: black;">Híbrida</option>
                    </select>
                    
                    <textarea name="pauta" placeholder="Assuntos a serem discutidos (Pauta)" rows="4" required></textarea>
                    
                    <input type="text" name="responsavel" placeholder="Responsável (Nome do proprietário)" required>
                    
                    <select name="status" required style="padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,0.15); color: white; margin-bottom: 20px;">
                        <option value="Agendada" style="color: black;" selected>Agendada</option>
                        <option value="Realizada" style="color: black;">Realizada</option>
                        <option value="Cancelada" style="color: black;">Cancelada</option>
                    </select>

                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; cursor: pointer;">
                        <input type="checkbox" name="publica" style="width: auto;">
                        Reunião Pública (Mostrar no site principal)
                    </label>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn glow" style="flex: 1;">Salvar Reunião</button>
                        <button type="button" id="btn-cancelar-reuniao" class="btn" style="flex: 1; background: #ff4d4d;">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- LISTA DE REUNIÕES -->
            <div class="ultimos-box glow-card">
                <h3 style="margin-bottom: 20px;">Reuniões Cadastradas</h3>
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color: #00ff99;">
                            <th style="padding: 10px;">Data/Hora</th>
                            <th style="padding: 10px;">Descrição</th>
                            <th style="padding: 10px;">Local/Modalidade</th>
                            <th style="padding: 10px;">Status</th>
                            <th style="padding: 10px;">Pública</th>
                            <th style="padding: 10px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-reunioes">
                        <!-- Linhas geradas por JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
