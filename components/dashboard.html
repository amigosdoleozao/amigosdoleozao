<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<!-- CSS Base e Admin -->
<link rel="stylesheet" href="../style/style.css">
<link rel="stylesheet" href="css/admin.css">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../dist/bundle.js"></script>

</head>

<body>

<!-- PARTICULAS PARA MANTER O TEMA -->
<div class="particles"></div>

<div class="painel">

    <!-- SIDEBAR -->

    <aside class="sidebar glow-card" style="margin: 20px; border-radius: 20px; height: calc(100vh - 40px);">

        <h2 style="color: #00ff99; text-align: center; margin-bottom: 30px;">LEOZÃO</h2>

        <a href="dashboard.html" class="active">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>

        <a href="painel.html">
            <i class="fa-solid fa-users"></i> Apoiadores
        </a>

        <a href="reunioes.html">
            <i class="fa-solid fa-handshake"></i> Reuniões
        </a>

        <a href="exportar_excel.html">
            <i class="fa-solid fa-file-excel"></i> Exportar Excel
        </a>

        <a href="../index.html" style="margin-top: auto;">
            <i class="fa-solid fa-house"></i> Voltar ao Site
        </a>

        <a href="logout.html" style="color: #ff4d4d;">
            <i class="fa-solid fa-right-from-bracket"></i> Sair
        </a>

    </aside>

    <!-- CONTEUDO -->

    <main class="conteudo">

        <!-- TOPO -->

        <div class="top-dashboard">

            <div class="card-status glow-card">

                <h3>Total de Apoiadores</h3>

                <h1 id="total-apoiadores">0</h1>

            </div>

            <div class="card-status glow-card">

                <h3>Bairros</h3>

                <h1 id="total-cidades">0</h1>

            </div>

            <div class="card-status glow-card">

                <h3>Últimos Cadastros</h3>

                <h1 id="total-ultimos">0</h1>

            </div>

        </div>

        <!-- GRAFICO -->

        <div class="grafico-box glow-card">

            <h2 style="text-align: center; margin-bottom: 20px; color: #00ff99;">
                Apoiadores por Bairro
            </h2>

            <canvas id="graficoCidade"></canvas>

        </div>

        <!-- ULTIMOS -->

        <div class="ultimos-box glow-card">

            <h2 style="text-align: center; margin-bottom: 20px; color: #00ff99;">
                Últimos Cadastros
            </h2>

            <table style="width: 100%; border-collapse: collapse; text-align: left;">

                <thead>

                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); color: #00ff99;">

                        <th style="padding: 10px;">Nome</th>
                        <th style="padding: 10px;">Bairro</th>
                        <th style="padding: 10px;">Data</th>

                    </tr>

                </thead>

                <tbody id="tabela-ultimos">

                    <!-- Linhas preenchidas via JavaScript -->

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>

</html>
